name: "Code Quality Checker"
description: "Check for memory leaks, poorly managed or even not managed memory, unclosed file descriptors, and static analysis issues."
branding:
  icon: "archive"
  color: "blue"
inputs:
  mode:
    description: "Tool to use: 'valgrind' or 'clang-static-analyzer'"
    required: false
    default: "valgrind"
  # clang-static-analyzer inputs
  source_files:
    description: "Space-separated source files to analyze (required when mode=clang-static-analyzer)"
    required: false
  clang_extra_flags:
    description: "Extra flags forwarded to clang --analyze"
    required: false
    default: ""
  # valgrind inputs
  binary_args:
    description: "The args to pass to the binary once started (string format)"
    required: false
  binary_path:
    description: "The binary to run Valgrind over"
    required: true
  ld_library_path:
    description: "Custom library path (for dymanic locally-compiled libraries)"
    required: false
  redzone_size:
    description: "Valgrind's padding blocks protection (redzone) in bytes"
    required: false
    default: 16
  track_file_descriptors:
    description: "Whether or not to track file descriptors (true or false)"
    required: false
    default: true
  treat_error_as_warning:
    description: "The workflow won't exit as error, and error annotations will be replaced by warnings"
    required: false
    default: false
  valgrind_suppressions:
    description: "String containing Valgrind suppressions (will be put inside a suppressions file)"
    required: false
  verbose:
    description: "Asking Valgrind to be verbose"
    required: false
    default: false
  timeout:
    description: "Limit running time of the binary"
    required: false
    default: 0

runs:
  using: "docker"
  image: "Dockerfile"
